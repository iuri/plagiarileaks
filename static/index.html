<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Scholarly Reference Checker</title>
    <style>
      body{font-family:system-ui,Segoe UI,Helvetica,Arial;margin:24px}
      textarea{width:100%;height:160px}
      pre{background:#f6f8fa;padding:12px}
    </style>
  </head>
  <body>
    <h2>Scholarly Reference Checker</h2>
    <p>Paste text to check for related published articles (Semantic Scholar / CrossRef)</p>
    <textarea id="txt">Enter text to check...</textarea>
    <p><button id="go">Check</button></p>
    <div id="out"></div>

    <script>
      document.getElementById('go').onclick = async function(){
        const text = document.getElementById('txt').value;
        const out = document.getElementById('out');
        out.innerHTML = 'Searching...';
        const r = await fetch('/api/check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
        if(!r.ok){ out.innerHTML = 'Error: '+(await r.text()); return }
        const j = await r.json();
        let html = '';
        if(j.matches){
          html += '<h3>Passage matches</h3>';
          for(const m of j.matches.passage_matches){
            html += `<div><strong>Score:</strong> ${m.score.toFixed(3)}<br/><strong>Passage:</strong><pre>${m.passage}</pre><strong>Article:</strong> ${m.article.title} (${m.article.year}) <a href="${m.article.url}" target="_blank">link</a><br/><pre>${m.article.excerpt}</pre></div><hr/>`;
          }
          html += '<h3>Global matches (full text)</h3>';
          for(const g of j.matches.global_matches){
            html += `<div><strong>Score:</strong> ${g.score.toFixed(3)} — ${g.article.title} (${g.article.year}) <a href="${g.article.url}" target="_blank">link</a><pre>${g.article.excerpt}</pre></div><hr/>`;
          }
        } else {
          html = '<pre>No matches</pre>';
        }
        out.innerHTML = html;
      }
    </script>
  </body>
</html>
